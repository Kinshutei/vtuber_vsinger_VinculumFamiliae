<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinculumFamiliae</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f2ee;
      --circle-idle: #ddd9d0;
      --accent:      #9b72d8;
      --accent2:     #c4a0ff;
      --text:        #ede8f5;
      --text-dark:   #2c2c2c;
      --text-dim:    #9a95b0;
      --border:      rgba(155,114,216,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans JP', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── ステージ ── */
    #stage {
      position: relative;
      width: 760px;
      height: 760px;
    }

    /* ── 共通サークル ── */
    .circle {
      position: absolute;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      user-select: none;
    }

    /* ── 中心サークル（待機状態） ── */
    #center {
      width: 300px;
      height: 300px;
      top:  50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--circle-idle);
      border: 2px solid #b8b4aa;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 10;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    /* タレント選択後 */
    #center.talent-active {
      background: var(--talent-bg, rgba(155,114,216,0.5));
      border: 2px solid var(--accent);
      box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }

    /* ── 外周サークル ── */
    .c-outer {
      width: 180px;
      height: 180px;
      background: var(--circle-idle);
      border: 1.5px solid #b8b4aa;
      z-index: 5;
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .c-outer.talent-active {
      background: var(--talent-bg, rgba(155,114,216,0.5));
      border: 1.5px solid var(--accent);
    }
    .c-outer.clickable {
      cursor: pointer;
    }
    @keyframes heartbeat {
      0%   { transform: scale(1); }
      8%   { transform: scale(1.13); }
      18%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .c-outer.clickable:hover {
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(0,0,0,0.15);
      animation: heartbeat 2s ease-in-out infinite;
    }
    .c-outer.empty {
      opacity: 0.4;
      cursor: default;
    }

    /* ── テキスト ── */
    .c-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.35;
      padding: 0 14px;
      word-break: break-all;
    }
    #center.talent-active .c-name,
    .c-outer.talent-active .c-name { color: var(--text); }
    #center .c-name { font-size: 18px; }
    .c-role {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    #center.talent-active .c-role,
    .c-outer.talent-active .c-role { color: rgba(255,255,255,0.75); }

    /* ── 検索 ── */
    .search-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 0 18px;
    }
    .search-hint { font-size: 13px; color: #888; }
    .search-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #aaa;
      color: var(--text-dark);
      font-size: 13px;
      text-align: center;
      outline: none;
      padding: 4px 0;
      font-family: inherit;
    }
    .search-wrap input::placeholder { color: #aaa; }

    /* ── 検索ドロップダウン ── */
    #searchDropdown {
      position: absolute;
      top: calc(50% + 80px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 180px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 50;
      display: none;
    }
    #searchDropdown.open { display: block; }
    .sd-item {
      padding: 8px 14px;
      font-size: 13px;
      color: #1a1a1a;
      cursor: pointer;
      border-bottom: 1px solid #e0ddd8;
    }
    .sd-item:last-child { border-bottom: none; }
    .sd-item:hover { background: #e8e4f0; color: #260d4c; }
    .sd-type { font-size: 10px; color: #888; margin-left: 6px; }

    /* ── 接続線 ── */
    .conn-line {
      position: absolute;
      height: 1px;
      background: var(--border);
      transform-origin: left center;
      pointer-events: none;
      z-index: 1;
    }

    /* ── ホームボタン ── */
    #homeBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0;
      pointer-events: none;
    }
    #homeBtn:hover { border-color: var(--accent); color: var(--text); }
    #homeBtn.visible { opacity: 1; pointer-events: auto; }

    /* ── ロード中 ── */
    #loadMsg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-dim);
      background: var(--bg);
      z-index: 100;
    }
    /* ── ライトボックス ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      cursor: pointer;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(155,114,216,0.4);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="loadMsg">読み込み中...</div>
<button id="homeBtn" onclick="goHome()">← 検索に戻る</button>
<div id="lightbox" onclick="closeLightbox()"></div>

<div id="stage">
  <div id="center" class="circle"></div>
  <div id="searchDropdown"></div>
</div>

<script>
// ── 定数 ────────────────────────────────────────────────────────────────────
const CX = 380, CY = 380

const ORBIT_R   = 270
const CENTER_R  = 150
const OUTER_R   = 90
const ANGLES = [0, 45, 90, 135, 180, 225, 270, 315]
// index 1 (45°) は×ボタン専用
const CONN_SLOTS = [0, 2, 3, 4, 5, 6, 7]

// ── 状態 ────────────────────────────────────────────────────────────────────
let db = { talents: [], creators: [], offices: [] }
let outerEls = []
let openImageOnSelect = false

// ── 初期化 ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('data/people.json')
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    db = await res.json()
    if (!db.talents)  db.talents  = []
    if (!db.creators) db.creators = []
    if (!db.offices)  db.offices  = []
  } catch(e) {
    console.error('データ読み込みエラー', e)
  }
  document.getElementById('loadMsg').style.display = 'none'
  renderSearch()
}

// ── ユーティリティ ──────────────────────────────────────────────────────────
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')

function posAt(angleIdx) {
  const rad = (ANGLES[angleIdx] - 90) * Math.PI / 180
  return { x: CX + ORBIT_R * Math.cos(rad), y: CY + ORBIT_R * Math.sin(rad) }
}

function clearOuter() {
  outerEls.forEach(el => el.remove())
  outerEls = []
}

function makeConnLine(px, py) {
  const dx = px - CX, dy = py - CY
  const dist = Math.sqrt(dx*dx + dy*dy)
  const angle = Math.atan2(dy, dx) * 180 / Math.PI
  const lineLen = dist - CENTER_R - OUTER_R - 4
  if (lineLen <= 0) return null
  const startX = CX + CENTER_R * Math.cos(angle * Math.PI / 180)
  const startY = CY + CENTER_R * Math.sin(angle * Math.PI / 180)
  const el = document.createElement('div')
  el.className = 'conn-line'
  el.style.width     = lineLen + 'px'
  el.style.left      = startX + 'px'
  el.style.top       = startY + 'px'
  el.style.transform = `rotate(${angle}deg)`
  return el
}

function makeOuter(angleIdx, name, roleLabel, onClick) {
  const { x, y } = posAt(angleIdx)
  const stage = document.getElementById('stage')
  const line = makeConnLine(x, y)
  if (line) { stage.appendChild(line); outerEls.push(line) }
  const el = document.createElement('div')
  el.className = 'circle c-outer' + (onClick ? ' clickable' : ' empty')
  el.style.left = (x - OUTER_R) + 'px'
  el.style.top  = (y - OUTER_R) + 'px'
  el.innerHTML = `
    <span class="c-name">${esc(name)}</span>
    ${roleLabel ? `<span class="c-role">${esc(roleLabel)}</span>` : ''}
  `
  if (onClick) el.onclick = onClick
  stage.appendChild(el)
  outerEls.push(el)
  return el
}

// ── 検索画面 ─────────────────────────────────────────────────────────────────
function renderSearch() {
  clearOuter()
  const centerEl = document.getElementById('center')
  centerEl.classList.remove('talent-active')
  centerEl.style.opacity = '1'
  centerEl.style.transition = 'none'
  document.getElementById('homeBtn').classList.remove('visible')
  centerEl.innerHTML = `
    <div class="search-wrap">
      <span class="search-hint">名前で検索</span>
      <input type="text" id="searchInput" placeholder="例: 深影" autocomplete="off">
    </div>
  `
  const input = document.getElementById('searchInput')
  input.addEventListener('input', onSearchInput)
  input.addEventListener('focus', onSearchInput)
  input.addEventListener('blur', () =>
    setTimeout(() => document.getElementById('searchDropdown').classList.remove('open'), 150)
  )
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = document.querySelector('#searchDropdown .sd-item')
      if (first) { e.preventDefault(); openImageOnSelect = true; first.dispatchEvent(new MouseEvent('mousedown')) }
    }
  })
  input.focus()
}

function onSearchInput() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim()
  const dd = document.getElementById('searchDropdown')
  const all = [
    ...db.talents.map(t => ({ ...t, _kind: 'talent' })),
    ...db.creators.map(c => ({ ...c, _kind: 'creator' })),
  ]
  let results
  if (!q) {
    results = all.slice().sort(() => Math.random() - 0.5).slice(0, 3)
  } else {
    results = all.filter(x => x.name.toLowerCase().includes(q)).slice(0, 12)
  }
  if (!results.length) { dd.classList.remove('open'); return }
  dd.innerHTML = results.map(r =>
    `<div class="sd-item" data-id="${esc(r.id)}" data-kind="${r._kind}">
      ${esc(r.name)}<span class="sd-type">${r._kind === 'talent' ? 'タレント' : 'クリエイター'}</span>
    </div>`
  ).join('')
  dd.classList.add('open')
  dd.querySelectorAll('.sd-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault()
      showNode(el.dataset.id, el.dataset.kind)
    })
  })
}

function goHome() {
  applyAccent('#9b72d8')
  renderSearch()
}

function applyAccent(color) {
  const r = parseInt(color.slice(1,3),16)
  const g = parseInt(color.slice(3,5),16)
  const b = parseInt(color.slice(5,7),16)
  document.documentElement.style.setProperty('--accent',    color)
  document.documentElement.style.setProperty('--accent2',   color)
  document.documentElement.style.setProperty('--border',    `rgba(${r},${g},${b},0.5)`)
  document.documentElement.style.setProperty('--talent-bg', `rgba(${r},${g},${b},0.5)`)
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox')
  lb.innerHTML = `<img src="${esc(src)}" alt="キービジュアル">`
  lb.classList.add('open')
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open') }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox() })

// ── ノード情報取得 ────────────────────────────────────────────────────────────
function getNodeInfo(id, type) {
  if (type === 'talent') {
    const t = db.talents.find(x => x.id === id)
    const office = db.offices.find(o => o.id === t?.office_id)
    return { name: t?.name || '—', sub: office?.name || '', color: office?.color || '#9b72d8', image: t?.image || null }
  }
  if (type === 'creator') {
    const c = db.creators.find(x => x.id === id)
    const roles = []
    if (db.talents.some(t => t.mama_id === id)) roles.push('ママ')
    if (db.talents.some(t => t.papa_id === id)) roles.push('パパ')
    if (db.talents.some(t => (t.costumes||[]).some(cs => cs.designer_id === id))) roles.push('衣装')
    if (db.talents.some(t => t.modeler_3d_id === id)) roles.push('3D')
    return { name: c?.name || '—', sub: roles.join(' / '), color: '#9b72d8', image: null }
  }
  if (type === 'office') {
    const o = db.offices.find(x => x.id === id)
    return { name: o?.name || '—', sub: '事務所', color: o?.color || '#9b72d8', image: null }
  }
  return { name: '—', sub: '', color: '#9b72d8', image: null }
}

// ── 接続ノード取得 ────────────────────────────────────────────────────────────
function getConnections(id, type) {
  const conns = []
  if (type === 'talent') {
    const t = db.talents.find(x => x.id === id)
    if (!t) return conns
    if (t.papa_id)       conns.push({ id: t.papa_id,       type: 'creator', label: 'パパ' })
    if (t.mama_id)       conns.push({ id: t.mama_id,       type: 'creator', label: 'ママ' })
    if (t.modeler_3d_id) conns.push({ id: t.modeler_3d_id, type: 'creator', label: '3D' })
    ;(t.costumes || []).forEach(cs => {
      if (cs.designer_id) conns.push({ id: cs.designer_id, type: 'creator', label: '衣装' })
    })
    if (t.office_id) conns.push({ id: t.office_id, type: 'office', label: '事務所' })
  } else if (type === 'creator') {
    db.talents.forEach(t => {
      const labels = []
      if (t.mama_id === id) labels.push('ママ')
      if (t.papa_id === id) labels.push('パパ')
      if (t.modeler_3d_id === id) labels.push('3D')
      if ((t.costumes||[]).some(cs => cs.designer_id === id)) labels.push('衣装')
      if (labels.length) conns.push({ id: t.id, type: 'talent', label: labels.join('/') })
    })
  } else if (type === 'office') {
    db.talents.filter(t => t.office_id === id).forEach(t => {
      conns.push({ id: t.id, type: 'talent', label: '所属' })
    })
  }
  return conns
}

// ── スライドアニメーション（中心から外へ）────────────────────────────────────
function slideFromCenter(el, finalX, finalY) {
  const dx = CX - finalX, dy = CY - finalY
  el.style.transition = 'none'
  el.style.transform  = `translate(${dx}px, ${dy}px)`
  el.style.opacity    = '0'
  el.getBoundingClientRect()
  el.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease'
  el.style.transform  = 'translate(0, 0)'
  el.style.opacity    = '1'
}

// ── ×ボタン ──────────────────────────────────────────────────────────────────
function addCloseButton() {
  const before = outerEls.length
  const el = makeOuter(1, '×', null, goHome)
  if (!el) return
  for (let i = before; i < outerEls.length - 1; i++) outerEls[i].remove()
  outerEls.splice(before, outerEls.length - 1 - before)
  const rad = (45 - 90) * Math.PI / 180
  const d   = 185
  el.style.width       = '34px'
  el.style.height      = '34px'
  el.style.left        = (CX + d * Math.cos(rad) - 17) + 'px'
  el.style.top         = (CY + d * Math.sin(rad) - 17) + 'px'
  el.style.background  = 'rgba(180,180,180,0.2)'
  el.style.borderColor = '#aaa'
  el.querySelector('.c-name').style.fontSize = '18px'
  el.querySelector('.c-name').style.color    = '#888'
}

// ── 外周円を描画 ──────────────────────────────────────────────────────────────
function renderOuters(id, type) {
  addCloseButton()
  const conns = getConnections(id, type)
  conns.slice(0, CONN_SLOTS.length).forEach((conn, i) => {
    const slotIdx = CONN_SLOTS[i]
    const info = getNodeInfo(conn.id, conn.type)
    const pos  = posAt(slotIdx)
    const outerEl = makeOuter(slotIdx, info.name, conn.label, () => {
      animateOuterToCenter(outerEl, pos.x, pos.y, conn.id, conn.type)
    })
    if (!outerEl) return
    if (conn.label === 'パパ') {
      outerEl.style.borderColor = '#afeeee'
      outerEl.style.background  = 'rgba(175,238,238,0.13)'
    } else if (conn.label === 'ママ') {
      outerEl.style.borderColor = '#EEAFee'
      outerEl.style.background  = 'rgba(238,175,238,0.13)'
    }
    slideFromCenter(outerEl, pos.x, pos.y)
  })
}

// ── ノード表示（直接） ────────────────────────────────────────────────────────
function showNode(id, type) {
  clearOuter()
  document.getElementById('homeBtn').classList.add('visible')
  const info = getNodeInfo(id, type)
  if (type === 'talent' && openImageOnSelect) {
    openImageOnSelect = false
    if (info.image) openLightbox(info.image)
  }
  applyAccent(info.color)
  const centerEl = document.getElementById('center')
  centerEl.style.transition = 'none'
  centerEl.style.opacity    = '1'
  centerEl.classList.toggle('talent-active', type === 'talent')
  centerEl.innerHTML = `
    <span class="c-name">${esc(info.name)}</span>
    ${info.sub ? `<span class="c-role">${esc(info.sub)}</span>` : ''}
  `
  renderOuters(id, type)
}

// ── 外周円→中心 アニメーション遷移 ───────────────────────────────────────────
function animateOuterToCenter(el, fromX, fromY, id, type) {
  outerEls.forEach(e => e.style.pointerEvents = 'none')
  const centerEl = document.getElementById('center')

  // 他の外周円フェードアウト
  outerEls.forEach(e => {
    if (e !== el) {
      e.style.transition = 'opacity 0.3s ease'
      e.style.opacity    = '0'
    }
  })

  // 中心円フェードアウト
  centerEl.style.transition = 'opacity 0.3s ease'
  centerEl.style.opacity    = '0'

  // 選択円を中心へ移動しながら拡大
  const dx    = CX - fromX
  const dy    = CY - fromY
  const scale = 300 / 180
  setTimeout(() => {
    el.style.transition      = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)'
    el.style.transformOrigin = 'center center'
    el.style.transform       = `translate(${dx}px, ${dy}px) scale(${scale})`
  }, 200)

  setTimeout(() => {
    outerEls.forEach(e => e.remove())
    outerEls = []

    const info = getNodeInfo(id, type)
    applyAccent(info.color)
    centerEl.classList.toggle('talent-active', type === 'talent')
    centerEl.innerHTML = `
      <span class="c-name">${esc(info.name)}</span>
      ${info.sub ? `<span class="c-role">${esc(info.sub)}</span>` : ''}
    `
    centerEl.style.transition = 'opacity 0.35s ease'
    centerEl.style.opacity    = '1'

    setTimeout(() => renderOuters(id, type), 380)
  }, 750)
}

init()
</script>
</body>
</html>
